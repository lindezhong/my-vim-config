#=====================================================
# 基础设置
#=====================================================

# 禁用 tmux 鼠标支持，使用终端原生滚动
# 这样右键菜单可以正常工作，滚动由终端模拟器处理
# set -g mouse on 

# 右键：有选中则复制，无选中则粘贴
# bind-key -n MouseDown3Pane if-shell -F "#{pane_in_mode}" "send-keys -X copy-selection-and-cancel" "paste-buffer"


#=====================================================
# 窗口和面板操作
#=====================================================

# Alt+PageUp/PageDown 直接翻页（无前缀）
bind-key -T copy-mode-vi M-PPage send-keys -X page-up
bind-key -T copy-mode-vi M-NPage send-keys -X page-down

# 被终端拦截无法使用
# Shift+PageUp/PageDown 直接翻页（无前缀）
bind-key -T copy-mode-vi S-PPage send-keys -X page-up
bind-key -T copy-mode-vi S-NPage send-keys -X page-down



#=====================================================
# 复制模式（vim 风格：v 选择，y 复制）
#=====================================================

# 使用 vi 键绑定（复制模式）
set-window-option -g mode-keys vi

# 进入复制模式
# 默认为 `bind-key [ copy-mode`
bind-key [ copy-mode
bind-key Enter copy-mode

# vi 风格的复制操作
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# 鼠标选择后不自动复制，需手动按 y 复制
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# 使用系统剪贴板（如果可用）
if-shell -b 'command -v wl-paste &> /dev/null' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe "wl-copy"'

#=====================================================
# 状态栏设置
#=====================================================

# 完全隐藏状态栏
set -g status off

# 如果需要临时显示，按前缀 + s （可自定义快捷键）
# 或者执行 `tmux set -g status` 显示
# bind s set -g status

#=====================================================
# 窗格分割线样式
#=====================================================

# 窗格分割线颜色
set -g pane-border-style 'fg=default'           # 窗格边界颜色（灰色）
set -g pane-active-border-style 'fg=default'    # 当前窗格边界颜色（青色）

# 或者使用更细的分割线
# set -g pane-border-lines single

# 或者完全隐藏分割线（使用空格）
# set -g pane-border-style 'fg=default'
# set -g pane-active-border-style 'fg=default'



